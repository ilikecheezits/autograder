name: "python-sandbox"
description: "Sandbox for running Python code"

mode: ONCE
hostname: "python-sandbox"
time_limit: 6
cwd: "/app/subcode"

mount {
    src: "/app"
    dst: "/app"
    is_bind: true
}

mount {
    src: "/usr/lib/python3"
    dst: "/usr/lib/python3"
    is_bind: true
}

mount {
    src: "/usr/local/lib/python3"
    dst: "/usr/local/lib/python3"
    is_bind: true
    mandatory: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    mandatory: false
}

rlimit_as: 256
rlimit_cpu: 6
rlimit_fsize: 1024
rlimit_nofile: 64

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

keep_caps: false
keep_env: false 