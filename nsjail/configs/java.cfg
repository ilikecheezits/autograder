name: "java-sandbox"
description: "Sandbox for running Java code"

mode: ONCE
hostname: "java-sandbox"
time_limit: 4
cwd: "/app/subcode"

mount {
    src: "/app"
    dst: "/app"
    is_bind: true
}

mount {
    src: "/usr/lib/jvm"
    dst: "/usr/lib/jvm"
    is_bind: true
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    mandatory: false
}

mount {
    src: "/usr/lib"
    dst: "/usr/lib"
    is_bind: true
}

rlimit_as: 512
rlimit_cpu: 4
rlimit_fsize: 1024
rlimit_nofile: 64

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

keep_caps: false
keep_env: false 